<!DOCTYPE html>
<html>
<head>
  <title>My Map App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 320px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #4285F4;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #2f6fe0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <input id="search" placeholder="Search location...">
  <button onclick="searchLocation()">Search</button>

  <button onclick="getCurrentLocation()">📍 My Location</button>

  <button onclick="getRestaurants()">Show Restaurants</button>

  <hr>

  <input id="from" placeholder="Start location">
  <input id="to" placeholder="Destination">
  <button onclick="getRoute()">Get Route</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([28.6139, 77.2090], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let markers = [];
  let routeLayer;

  // 🔵 USER LOCATION VARIABLES
  let userMarker;
  let userCircle;

  // 🔍 SEARCH
  function searchLocation() {
    let query = document.getElementById("search").value;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
      .then(res => res.json())
      .then(data => {
        if (data.length > 0) {
          let lat = data[0].lat;
          let lon = data[0].lon;

          map.setView([lat, lon], 15);

          let marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(query)
            .openPopup();

          markers.push(marker);
        }
      });
  }

  // 📍 CURRENT LOCATION (BLUE DOT)
  function getCurrentLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(position => {

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        map.setView([lat, lon], 16);

        // Remove old location
        if (userMarker) map.removeLayer(userMarker);
        if (userCircle) map.removeLayer(userCircle);

        // Blue dot
        userMarker = L.circleMarker([lat, lon], {
          radius: 8,
          color: "#fff",
          weight: 2,
          fillColor: "#1E90FF",
          fillOpacity: 1
        }).addTo(map);

        // Glow circle
        userCircle = L.circle([lat, lon], {
          radius: 50,
          color: "#1E90FF",
          fillColor: "#1E90FF",
          fillOpacity: 0.2,
          stroke: false
        }).addTo(map);

      }, () => {
        alert("Location access denied");
      });
    } else {
      alert("Geolocation not supported");
    }
  }

  // 🍽️ RESTAURANTS
  function getRestaurants() {
    let bounds = map.getBounds();

    let query = `
      [out:json];
      node["amenity"="restaurant"]
      (${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
      out;
    `;

    fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    })
    .then(res => res.json())
    .then(data => {
      data.elements.forEach(place => {
        let marker = L.marker([place.lat, place.lon])
          .addTo(map)
          .bindPopup(place.tags.name || "Restaurant");

        markers.push(marker);
      });
    });
  }

  // 🚗 ROUTE
  function getRoute() {
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    Promise.all([
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${from}`).then(res => res.json()),
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${to}`).then(res => res.json())
    ])
    .then(results => {
      if (results[0].length === 0 || results[1].length === 0) {
        alert("Location not found");
        return;
      }

      let start = results[0][0];
      let end = results[1][0];

      let url = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${end.lon},${end.lat}?overview=full&geometries=geojson`;

      return fetch(url);
    })
    .then(res => res.json())
    .then(data => {
      if (!data) return;

      if (routeLayer) {
        map.removeLayer(routeLayer);
      }

      let route = data.routes[0].geometry;

      routeLayer = L.geoJSON(route, {
        style: { color: "blue", weight: 5 }
      }).addTo(map);

      map.fitBounds(routeLayer.getBounds());
    });
  }
</script>

</body>
</html>
